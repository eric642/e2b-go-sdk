name: test

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  unit:
    name: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          check-latest: true
      - run: go vet ./...
      - run: go test -race ./...

  integration:
    name: integration
    runs-on: ubuntu-latest
    needs: unit
    # Only run when a valid key secret is present (forks & first-time PRs skip).
    if: ${{ secrets.E2B_API_KEY != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          check-latest: true
      - run: go test -run Integration -timeout 15m ./...
        env:
          E2B_API_KEY: ${{ secrets.E2B_API_KEY }}
