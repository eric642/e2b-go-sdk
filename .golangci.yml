version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused

  exclusions:
    # Generated clients live under internal/ and shouldn't be hand-linted.
    paths:
      - internal
      - E2B

  settings:
    errcheck:
      exclude-functions:
        - (*os.File).Close
        - (io.Closer).Close
    staticcheck:
      checks:
        - all
        - -ST1000
