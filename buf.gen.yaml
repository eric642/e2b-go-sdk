version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/eric642/e2b-go-sdk/internal/envd
plugins:
  - local: protoc-gen-go
    out: internal/envd
    opt:
      - paths=source_relative
  - local: protoc-gen-connect-go
    out: internal/envd
    opt:
      - paths=source_relative
inputs:
  - directory: spec/envd
