# Example E2B sandbox template config for examples/desktop.
#
# Fork users: replace team_id / template_id with your own (run
# `e2b auth login && e2b template init`) or just delete both lines —
# the first `e2b template build` will mint new values for your account.

# team_id = "<your-team-uuid>"
# template_id = "<your-template-id>"
memory_mb = 4_096
cpu_count = 2
ready_cmd = "pgrep -x Xvfb >/dev/null && pgrep -f 'websockify.*6080' >/dev/null && pgrep -f 'websockify.*6081' >/dev/null && sudo -u user -H tmux -L main has-session -t main 2>/dev/null"
start_cmd = "/usr/local/bin/start-desktop.sh"
dockerfile = "e2b.Dockerfile"
